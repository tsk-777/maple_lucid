<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루시드 나이트메어 헬레나 QTE 연습</title>
    <style>
        body {
            background-color: #0b0214;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* 게임 컨테이너 */
        .game-container {
            text-align: center;
            background: linear-gradient(180deg, rgba(40, 10, 65, 0.8) 0%, rgba(15, 5, 30, 0.9) 100%);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(162, 0, 255, 0.5);
            border: 2px solid #a200ff;
            width: 600px;
            position: relative;
        }

        /* 재배치 버튼 스타일 */
        .reset-btn {
            background: linear-gradient(180deg, #a200ff 0%, #6a00b8 100%);
            border: 1px solid #bc66ff;
            color: white;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(162, 0, 255, 0.6);
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }
        .reset-btn:hover {
            background: linear-gradient(180deg, #bc66ff 0%, #a200ff 100%);
            box-shadow: 0 0 15px rgba(188, 102, 255, 0.8);
        }
        .reset-btn:active {
            transform: scale(0.98);
        }

        /* 상태 메시지 (성공/실패) */
        .status-message {
            font-size: 24px;
            font-weight: bold;
            height: 35px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status-success { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        .status-fail { color: #ff3333; text-shadow: 0 0 10px #ff3333; }

        /* 진동 애니메이션 클래스 */
        .shake {
            animation: shake 0.2s ease-in-out;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }

        /* 글자 표시 영역 */
        .word-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            background: rgba(80, 20, 120, 0.4);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(162, 0, 255, 0.3);
            margin-bottom: 25px;
        }

        /* 개별 글자 스타일 */
        .char-box {
            position: relative;
            width: 50px;
            height: 50px;
            line-height: 50px;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            background: radial-gradient(circle, #5e0bb5 0%, #250252 100%);
            border: 2px solid #bc66ff;
            border-radius: 12px;
            text-shadow: 0 0 5px #ffffff;
            box-shadow: 0 0 8px rgba(188, 102, 255, 0.6);
        }

        /* 현재 입력해야 할 글자 강조 */
        .char-box.active {
            border-color: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
        }
        .char-box.active::before {
            content: '▼';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #00ffcc;
        }

        /* 이미 입력 완료된 글자 */
        .char-box.completed {
            background: #110022;
            border-color: #555;
            color: #555;
            text-shadow: none;
            box-shadow: none;
        }

        /* 게이지 바 */
        .progress-container {
            width: 80%;
            height: 14px;
            background-color: #221133;
            border-radius: 7px;
            margin: 0 auto 10px auto;
            overflow: hidden;
            border: 1px solid #a200ff;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #a200ff, #ff00ea);
            box-shadow: 0 0 10px #ff00ea;
            transition: width 0.1s linear;
        }

        /* 타이머 텍스트 */
        .timer-text {
            font-size: 18px;
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* 푸터 스타일 */
        #footer {
            margin-top: 40px;
            text-align: center;
            opacity: 0.7;
        }
        .main-title-bottom {
            font-size: 16px;
            font-weight: bold;
            color: #bc66ff;
            margin-bottom: 5px;
        }
        .dev-info {
            font-size: 12px;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <button id="resetBtn" class="reset-btn">재배치</button>

        <div id="status" class="status-message"></div>

        <div id="wordContainer" class="word-container"></div>

        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>

        <div id="timer" class="timer-text">남은 시간: 3.00초</div>
    </div>

    <div id="footer">
        <div class="main-title-bottom">루시드 나이트메어 헬레나 qte연습</div>
        <div class="dev-info">Developed by @tsk-777 on GitHub</div>
    </div>

    <script>
        const ALLOWED_KEYS = ['a', 's', 'd', 'f', 'q', 'w', 'e', 'r'];
        const KOR_MAP = {
            'ㅁ': 'a', 'ㄴ': 's', 'ㅇ': 'd', 'ㄹ': 'f',
            'ㅂ': 'q', 'ㅈ': 'w', 'ㄷ': 'e', 'ㄱ': 'r'
        };

        const LIMIT_TIME = 3000; // 제한 시간 3초
        
        let currentSequence = [];
        let currentIndex = 0;
        let startTime = 0;
        let timerInterval = null;
        let isTimeOver = false;

        const wordContainer = document.getElementById('wordContainer');
        const progressBar = document.getElementById('progressBar');
        const timerText = document.getElementById('timer');
        const statusText = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');

        // 새로운 무작위 라운드 생성
        function initNewRound(isManual = false) {
            if (timerInterval) clearInterval(timerInterval);
            
            // 수동으로 [재배치] 버튼을 누른 경우 무조건 상태창을 비움
            if (isManual) {
                statusText.textContent = "";
                statusText.className = "status-message";
            } else if (currentSequence.length > 0) {
                // 이전 라운드 성공 상태로 끝났을 때만 파훼 성공 출력
                if (!isTimeOver && !statusText.classList.contains('status-fail')) {
                    statusText.textContent = "파훼 성공!";
                    statusText.className = "status-message status-success";
                }
            }

            currentSequence = [];
            currentIndex = 0;
            isTimeOver = false;
            wordContainer.innerHTML = '';

            for (let i = 0; i < 8; i++) {
                const randomKey = ALLOWED_KEYS[Math.floor(Math.random() * ALLOWED_KEYS.length)];
                currentSequence.push(randomKey);

                const charBox = document.createElement('div');
                charBox.classList.add('char-box');
                charBox.textContent = randomKey;
                wordContainer.appendChild(charBox);
            }

            updateHighlight();
            
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 20);
        }

        // 현재 입력 타겟 시각화
        function updateHighlight() {
            const boxes = wordContainer.children;
            for (let i = 0; i < boxes.length; i++) {
                boxes[i].classList.remove('active', 'completed');
                if (i < currentIndex) {
                    boxes[i].classList.add('completed');
                } else if (i === currentIndex) {
                    boxes[i].classList.add('active');
                }
            }
        }

        // 실시간 타이머 및 게이지 조절
        function updateTimer() {
            const elapsedTime = Date.now() - startTime;
            const remainingTime = Math.max(0, LIMIT_TIME - elapsedTime);
            
            timerText.textContent = `남은 시간: ${(remainingTime / 1000).toFixed(2)}초`;

            const progressPercent = (elapsedTime / LIMIT_TIME) * 100;
            progressBar.style.width = `${Math.min(100, progressPercent)}%`;

            if (elapsedTime >= LIMIT_TIME) {
                clearInterval(timerInterval);
                handleTimeOver();
            }
        }

        // 시간 초과 시 처리
        function handleTimeOver() {
            isTimeOver = true;
            triggerFailureEffects();
            timerText.textContent = `남은 시간: 0.00초`;
            progressBar.style.width = `100%`;
        }

        // 실패 효과 일괄 처리 (문구 갱신 및 진동)
        function triggerFailureEffects() {
            statusText.textContent = "파훼 실패!";
            statusText.className = "status-message status-fail";
            
            // 기존 애니메이션 클래스가 붙어 있다면 제거 후 재적용하여 매번 진동하게 처리
            statusText.classList.remove('shake');
            void statusText.offsetWidth; // 브라우저가 CSS 리플로우를 강제하도록 트리거
            statusText.classList.add('shake');
        }

        // 키보드 이벤트
        window.addEventListener('keydown', (e) => {
            if (currentSequence.length === 0) return;

            let pressedKey = e.key.toLowerCase();
            if (KOR_MAP[e.key]) pressedKey = KOR_MAP[e.key];

            if (!ALLOWED_KEYS.includes(pressedKey)) return;

            // 정답 입력 시
            if (pressedKey === currentSequence[currentIndex]) {
                currentIndex++;
                updateHighlight();

                // 8글자 완타 시 다음 라운드로 재생성
                if (currentIndex === currentSequence.length) {
                    if (timerInterval) clearInterval(timerInterval);
                    
                    // 실패 흔적이 있는 상태에서 끝났다면 0.8초 딜레이 후 다음 라운드
                    if (isTimeOver || statusText.classList.contains('status-fail')) {
                        setTimeout(() => { initNewRound(false); }, 800);
                    } else {
                        initNewRound(false);
                    }
                }
            } else {
                // 틀린 키 입력 시 제자리 고정 및 진동 효과 발생
                triggerFailureEffects();
            }
        });

        // 재배치 버튼 클릭 이벤트
        resetBtn.addEventListener('click', () => {
            initNewRound(true);
            resetBtn.blur();
        });

        // 시작
        initNewRound(true);
    </script>
</body>
</html>
